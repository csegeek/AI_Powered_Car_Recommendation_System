spring.application.name=cardekho

# Render injects PORT at runtime; default to 8080 for local/Docker use
server.port=${PORT:8080}

# --- Database (set these as environment variables) ---
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# Schema/data already exist in the database, never let Hibernate alter them
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.default_schema=car_recomendation_system

# --- Gemini (Google GenAI Developer API) via Spring AI ---
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.chat.options.model=gemini-2.5-flash

# --- Thymeleaf ---
spring.thymeleaf.cache=false

server.error.whitelabel.enabled=false
server.error.include-message=always

logging.level.org.springframework.ai.chat.client.advisor=DEBUG